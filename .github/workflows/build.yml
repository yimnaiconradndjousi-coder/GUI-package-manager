name: "Build & Release ResiliencePM"

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Build for Mac, Linux, and Windows using GitHub's free servers
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      # Linux requires specific GTK dependencies to build Tauri apps
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Regenerate Valid Binary Icons
        run: |
          node -e "const fs = require('fs'); const cp = require('child_process'); fs.writeFileSync('temp-icon.png', Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64')); cp.execSync('npx tauri icon temp-icon.png', {stdio: 'inherit'});"

      # The tauri-action will build the app and automatically create a GitHub Release
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: "ResiliencePM v__VERSION__"
          releaseBody: "Automated cloud build for ResiliencePM."
          releaseDraft: true
          prerelease: false
